spring.application.name=finance-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- NEW: HikariCP Connection Pool Settings ---
# Neon/Cloud DBs often close idle connections after 30-60s.
# We set max-lifetime to 30s so our app retires them before the DB kills them.
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2

# JPA/Hibernate Configuration
# REMOVED: spring.jpa.database-platform (Hibernate 6+ detects this automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Highly recommended to avoid the "open-in-view" warning in your logs:
spring.jpa.open-in-view=false

# CRITICAL: Force PostgreSQL dialect to prevent BYTEA mapping issues
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
logging.level.root=INFO
logging.level.com.finance.backend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Show full stack traces in error responses (for debugging)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# JWT Configuration
jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}